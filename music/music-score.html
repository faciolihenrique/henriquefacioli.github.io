<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Reader Pro - Centered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            height: 100vh; /* Força a altura da tela */
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita scrolls desnecessários */
        }
        .correct { background-color: #dcfce7 !important; transition: background 0.2s; }
        .wrong { background-color: #fee2e2 !important; animation: shake 0.2s ease-in-out 0s 2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        
        #settingsPanel { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #settingsPanel.open { transform: translateX(0); }
        
        /* Centralização do SVG do VexFlow */
        #output svg { margin: 0 auto; }
    </style>
</head>
<body>

    <header class="w-full bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0">
        <div class="flex gap-8">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Pontos</p>
                <p id="score" class="text-xl font-black text-slate-800">0</p>
            </div>
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Tempo</p>
                <p id="timerDisplay" class="text-xl font-black text-indigo-600">--</p>
            </div>
        </div>
        <button id="toggleSettings" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        </button>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6">
        
        <div class="w-full max-w-2xl flex flex-col items-center gap-10">
            
            <div id="game-container" class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl shadow-slate-200/60 border border-slate-100 flex flex-col items-center justify-center relative w-full aspect-[16/10] max-h-[40vh]">
                <div id="output" class="w-full flex justify-center"></div>
                
                <div id="detectedNoteContainer" class="absolute top-6 right-6 hidden bg-indigo-50 px-4 py-1.5 rounded-full border border-indigo-100 flex items-center shadow-sm">
                    <span class="text-[10px] font-bold text-indigo-400 uppercase mr-2">Ouvindo:</span>
                    <span id="detectedNoteText" class="text-sm font-black text-indigo-600 uppercase">--</span>
                </div>

                <div id="survivalBarContainer" class="absolute bottom-0 left-0 w-full h-2.5 bg-slate-100 hidden rounded-b-[2.5rem] overflow-hidden">
                    <div id="survivalBar" class="h-full bg-orange-500 w-full transition-all linear"></div>
                </div>
            </div>

            <button id="startBtn" class="px-16 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-xl shadow-indigo-200 transition-all active:scale-95 hidden">
                Começar Treino
            </button>

            <div id="buttonGrid" class="grid grid-cols-4 md:grid-cols-7 gap-3 w-full">
                </div>
        </div>
    </main>

    <aside id="settingsPanel" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-20 p-8 border-l border-slate-200 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold text-slate-800">Ajustes</h2>
            <button id="closeSettings" class="text-slate-400 hover:text-slate-600 p-2">✕</button>
        </div>

        <div class="space-y-8">
            <section>
                <label class="text-xs font-bold text-slate-400 uppercase block mb-4 tracking-widest">Áudio</label>
                <button id="micToggle" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-sm font-bold py-4 rounded-2xl transition-colors flex items-center justify-center gap-3 mb-4">
                    <span id="micStatusIcon">🎤</span> <span id="micStatusText">Ativar Microfone</span>
                </button>
                <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden mb-3">
                    <div id="volMeter" class="h-full bg-emerald-400 w-0 transition-all duration-75"></div>
                </div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-[10px] text-slate-500 font-bold uppercase">Sensibilidade</label>
                    <span id="thresholdVal" class="text-[10px] font-mono text-indigo-600 font-bold">0.010</span>
                </div>
                <input type="range" id="thresholdSlider" min="0.001" max="0.1" step="0.001" value="0.01" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </section>

            <hr class="border-slate-100">

            <section>
                <label class="text-xs font-bold text-slate-400 uppercase block mb-4 tracking-widest">Configuração</label>
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl mb-4">
                    <span class="text-sm font-bold text-slate-700">Notas Acidentadas</span>
                    <input type="checkbox" id="accidentalToggle" class="w-5 h-5 accent-indigo-600">
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] text-slate-500 font-bold uppercase">Sistema</label>
                    <select id="namingSelect" class="w-full bg-slate-50 border border-slate-200 text-sm font-bold rounded-xl p-3 outline-none">
                        <option value="letters">C, D, E...</option>
                        <option value="solfege" selected>Dó, Ré, Mi...</option>
                    </select>
                </div>

                <div class="space-y-2 mt-4">
                    <label class="text-[10px] text-slate-500 font-bold uppercase">Modo de Jogo</label>
                    <select id="modeSelect" class="w-full bg-slate-50 border border-slate-200 text-sm font-bold rounded-xl p-3 outline-none">
                        <option value="practice">Prática Livre</option>
                        <option value="timeAttack">Time Attack (60s)</option>
                        <option value="survival">Survival (3s)</option>
                    </select>
                </div>
            </section>
        </div>
    </aside>

    <script>
        // ... (Mesmo código JavaScript da versão anterior, apenas mantendo a lógica)
        const VF = Vex.Flow;
        const namingMap = { 
            'C': 'Dó', 'C#': 'Dó#', 'Db': 'Réb', 'D': 'Ré', 'D#': 'Ré#', 'Eb': 'Mib', 
            'E': 'Mi', 'F': 'Fá', 'F#': 'Fá#', 'Gb': 'Solb', 'G': 'Sol', 'G#': 'Sol#', 
            'Ab': 'Láb', 'A': 'Lá', 'A#': 'Lá#', 'Bb': 'Sib', 'B': 'Si' 
        };

        const notesBase = [
            { key: "c/4", name: "C", accidental: null },
            { key: "c/4", name: "C#", accidental: "#" },
            { key: "d/4", name: "Db", accidental: "b" },
            { key: "d/4", name: "D", accidental: null },
            { key: "d/4", name: "D#", accidental: "#" },
            { key: "e/4", name: "Eb", accidental: "b" },
            { key: "e/4", name: "E", accidental: null },
            { key: "f/4", name: "F", accidental: null },
            { key: "f/4", name: "F#", accidental: "#" },
            { key: "g/4", name: "Gb", accidental: "b" },
            { key: "g/4", name: "G", accidental: null },
            { key: "g/4", name: "G#", accidental: "#" },
            { key: "a/4", name: "Ab", accidental: "b" },
            { key: "a/4", name: "A", accidental: null },
            { key: "a/4", name: "A#", accidental: "#" },
            { key: "b/4", name: "Bb", accidental: "b" },
            { key: "b/4", name: "B", accidental: null }
        ];

        let score = 0, currentNoteObj = null, namingConvention = "solfege", gameMode = "practice";
        let isGameActive = false, isMicEnabled = false, currentThreshold = 0.01, includeAccidentals = false;
        let audioCtx, analyser, dataArray;

        const scoreEl = document.getElementById("score"), timerEl = document.getElementById("timerDisplay"), buttonGrid = document.getElementById("buttonGrid");
        
        document.getElementById("toggleSettings").onclick = () => document.getElementById("settingsPanel").classList.add("open");
        document.getElementById("closeSettings").onclick = () => document.getElementById("settingsPanel").classList.remove("open");

        function initButtons() {
            buttonGrid.innerHTML = "";
            const list = includeAccidentals 
                ? ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'] 
                : ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            
            list.forEach(n => {
                const label = namingConvention === 'solfege' ? namingMap[n] : n;
                const btn = document.createElement("button");
                btn.className = "bg-white border-2 border-slate-100 hover:border-indigo-500 hover:text-indigo-600 text-slate-700 py-4 rounded-2xl text-sm font-bold transition-all active:scale-95 shadow-sm";
                btn.innerText = label;
                btn.onclick = () => checkAnswer(n);
                buttonGrid.appendChild(btn);
            });
        }

        function renderNote() {
            const output = document.getElementById("output");
            output.innerHTML = "";
            const pool = includeAccidentals ? notesBase : notesBase.filter(n => !n.accidental);
            currentNoteObj = pool[Math.floor(Math.random() * pool.length)];

            const renderer = new VF.Renderer(output, VF.Renderer.Backends.SVG);
            renderer.resize(250, 180);
            const context = renderer.getContext();
            const stave = new VF.Stave(10, 30, 230).addClef("treble").setContext(context).draw();
            const note = new VF.StaveNote({ clef: "treble", keys: [currentNoteObj.key], duration: "q" });
            if (currentNoteObj.accidental) note.addModifier(new VF.Accidental(currentNoteObj.accidental), 0);
            if (currentNoteObj.key === "c/4" && !currentNoteObj.accidental) note.addModifier(new VF.ExtraLine(), 0);
            const voice = new VF.Voice({num_beats: 1, beat_value: 4}).addTickables([note]);
            new VF.Formatter().joinVoices([voice]).format([voice], 100);
            voice.draw(context, stave);
            if (gameMode === 'survival' && isGameActive) startSurvivalTimer();
        }

        function checkAnswer(guess) {
            if (gameMode !== 'practice' && !isGameActive) return;
            const container = document.getElementById("game-container");
            const enharmonics = { 'C#': ['C#', 'Db'], 'Db': ['C#', 'Db'], 'D#': ['D#', 'Eb'], 'Eb': ['D#', 'Eb'], 'F#': ['F#', 'Gb'], 'Gb': ['F#', 'Gb'], 'G#': ['G#', 'Ab'], 'Ab': ['G#', 'Ab'], 'A#': ['A#', 'Bb'], 'Bb': ['A#', 'Bb'] };
            const isCorrect = (guess === currentNoteObj.name) || (enharmonics[currentNoteObj.name] && enharmonics[currentNoteObj.name].includes(guess));

            if (isCorrect) {
                score++; scoreEl.innerText = score;
                container.classList.add("correct");
                setTimeout(() => container.classList.remove("correct"), 200);
                renderNote();
            } else {
                container.classList.add("wrong");
                setTimeout(() => container.classList.remove("wrong"), 300);
            }
        }

        async function setupMic() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);
                dataArray = new Float32Array(analyser.frequencyBinCount);
                isMicEnabled = true;
                document.getElementById("micStatusText").innerText = "Microfone Ativo";
                document.getElementById("detectedNoteContainer").classList.remove("hidden");
                detectPitch();
            } catch (err) { alert("Microfone bloqueado."); }
        }

        function detectPitch() {
            if (!isMicEnabled) return;
            analyser.getFloatTimeDomainData(dataArray);
            let rms = 0;
            for (let i=0; i<dataArray.length; i++) rms += dataArray[i]*dataArray[i];
            rms = Math.sqrt(rms/dataArray.length);
            document.getElementById("volMeter").style.width = Math.min(rms * 500, 100) + "%";
            if (rms > currentThreshold) {
                const pitch = autoCorrelate(dataArray, audioCtx.sampleRate);
                if (pitch !== -1) {
                    const noteName = getNoteFromFreq(pitch);
                    if (noteName) { checkAnswer(noteName); document.getElementById("detectedNoteText").innerText = namingConvention === 'solfege' ? namingMap[noteName] : noteName; }
                }
            }
            requestAnimationFrame(detectPitch);
        }

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length, maxval=-1, maxpos=-1, c = new Array(SIZE).fill(0);
            for (let i=0; i<SIZE; i++) for (let j=0; j<SIZE-i; j++) c[i] = c[i] + buf[j]*buf[j+i];
            let d=0; while (c[d]>c[d+1]) d++;
            for (let i=d; i<SIZE; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
            return sampleRate/maxpos;
        }

        function getNoteFromFreq(freq) {
            const notesScale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            const j = Math.round(12 * (Math.log(freq / 440) / Math.log(2))) + 69;
            return notesScale[j % 12];
        }

        let timer, timeLeft, survivalTimeout;
        function startTimer(seconds) {
            clearInterval(timer); timeLeft = seconds;
            timer = setInterval(() => { timeLeft--; timerEl.innerText = `${timeLeft}s`; if (timeLeft <= 0) endGame("Fim de Tempo!"); }, 1000);
        }
        function startSurvivalTimer() {
            clearTimeout(survivalTimeout);
            const bar = document.getElementById("survivalBar");
            bar.style.width = "100%"; bar.style.transition = "none"; void bar.offsetWidth;
            bar.style.transition = "width 3s linear"; bar.style.width = "0%";
            survivalTimeout = setTimeout(() => { if(isGameActive) endGame("Lento!"); }, 3000);
        }
        function startGame() {
            score = 0; scoreEl.innerText = "0"; isGameActive = true;
            document.getElementById("startBtn").classList.add("hidden");
            if (gameMode === 'timeAttack') startTimer(60);
            else if (gameMode === 'survival') { timerEl.innerText = "∞"; document.getElementById("survivalBarContainer").classList.remove("hidden"); }
            renderNote();
        }
        function endGame(msg) {
            isGameActive = false; clearInterval(timer); clearTimeout(survivalTimeout);
            alert(`${msg}\nScore: ${score}`);
            document.getElementById("startBtn").classList.remove("hidden");
            document.getElementById("survivalBarContainer").classList.add("hidden");
        }

        document.getElementById("accidentalToggle").onchange = (e) => { includeAccidentals = e.target.checked; initButtons(); renderNote(); };
        document.getElementById("thresholdSlider").oninput = (e) => { currentThreshold = parseFloat(e.target.value); document.getElementById("thresholdVal").innerText = currentThreshold.toFixed(3); };
        document.getElementById("micToggle").onclick = () => { if(!isMicEnabled) setupMic(); };
        document.getElementById("namingSelect").onchange = (e) => { namingConvention = e.target.value; initButtons(); };
        document.getElementById("modeSelect").onchange = (e) => { gameMode = e.target.value; document.getElementById("startBtn").classList.toggle("hidden", gameMode === 'practice'); if(gameMode === 'practice') { isGameActive = false; renderNote(); } };
        document.getElementById("startBtn").onclick = startGame;

        initButtons();
        renderNote();
    </script>
</body>
</html>
