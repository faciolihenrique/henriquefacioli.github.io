<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Reader Pro - Deep Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <script>
        // Configuração do Tailwind para modo escuro via classe
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        
        /* Cores de Erro/Acerto Adaptadas para Deep Dark */
        .correct-flash { background-color: #dcfce7 !important; transition: background 0.2s; }
        .dark .correct-flash { background-color: #064e3b !important; } /* Verde escuro profundo */
        
        .wrong-flash { background-color: #fee2e2 !important; animation: shake 0.2s ease-in-out 0s 2; }
        .dark .wrong-flash { background-color: #7f1d1d !important; } /* Vermelho escuro profundo */
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(5px); } 75% { transform: translateX(-5px); } }
        #settingsPanel { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #settingsPanel.open { transform: translateX(0); }
        .timer-bar { transition: width 0.1s linear; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0e0e0f] text-slate-900 dark:text-slate-200 h-screen flex flex-col overflow-hidden">

    <header class="w-full bg-white dark:bg-[#0e0e0f] border-b border-slate-200 dark:border-[#37393b] px-6 py-4 flex justify-between items-center shrink-0 shadow-sm z-10">
        <div class="flex gap-8">
            <div>
                <p class="text-[10px] font-bold text-slate-400 dark:text-slate-600 uppercase tracking-wider">Pontos</p>
                <p id="score" class="text-xl font-black">0</p>
            </div>
            <div>
                <p class="text-[10px] font-bold text-slate-400 dark:text-slate-600 uppercase tracking-wider">Tempo</p>
                <p id="timerDisplay" class="text-xl font-black text-indigo-600 dark:text-indigo-400">--</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="themeToggle" class="p-2 hover:bg-slate-100 dark:hover:bg-[#2a2a2a] rounded-full transition-colors text-xl">
                <span id="themeIcon">🌓</span>
            </button>
            <button id="toggleSettings" class="p-2 hover:bg-slate-100 dark:hover:bg-[#2a2a2a] rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 gap-8">
        <div id="game-container" class="bg-white dark:bg-[#2a2a2a] p-10 rounded-[3rem] shadow-2xl dark:shadow-indigo-950/20 border border-slate-100 dark:border-[#37393b] flex flex-col items-center justify-center relative w-full max-w-xl min-h-[320px] transition-colors overflow-visible">
            <div id="output" class="flex justify-center w-full"></div>
            
            <div id="detectedNoteContainer" class="absolute top-6 right-8 hidden bg-indigo-50 dark:bg-[#37393b] px-4 py-1.5 rounded-full border border-indigo-100 dark:border-indigo-900 flex items-center shadow-sm">
                <span class="text-[10px] font-bold text-indigo-400 dark:text-indigo-300 uppercase mr-2">Ouvindo:</span>
                <span id="detectedNoteText" class="text-sm font-black text-indigo-600 dark:text-indigo-400 uppercase">--</span>
            </div>

            <div id="survivalBarContainer" class="absolute bottom-0 left-0 w-full h-3 bg-slate-100 dark:bg-[#37393b] hidden rounded-b-[3rem] overflow-hidden">
                <div id="survivalBar" class="h-full bg-orange-500 w-full timer-bar"></div>
            </div>
        </div>

        <button id="startBtn" class="px-16 bg-indigo-600 dark:bg-indigo-500 hover:bg-indigo-700 dark:hover:bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl transition-all hidden">
            Começar Treino
        </button>

        <div id="buttonGrid" class="grid grid-cols-4 md:grid-cols-7 gap-3 w-full max-w-2xl px-4"></div>
    </main>

    <aside id="settingsPanel" class="fixed top-0 right-0 h-full w-80 bg-white dark:bg-[#0e0e0f] shadow-2xl z-20 p-8 border-l border-slate-200 dark:border-[#37393b] overflow-y-auto text-slate-700 dark:text-slate-300">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold dark:text-white">Ajustes</h2>
            <button id="closeSettings" class="text-slate-400 hover:text-slate-600 p-2 font-bold">✕</button>
        </div>

        <div class="space-y-8">
            <section>
                <label class="text-xs font-bold text-slate-400 uppercase block mb-4 tracking-widest">Exercício</label>
                <select id="exerciseType" class="w-full bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] text-sm font-bold rounded-xl p-3 outline-none">
                    <option value="single">Nota Única</option>
                    <option value="phrase" selected>Frase (4 notas)</option>
                </select>
            </section>

            <section>
                <label class="text-xs font-bold text-slate-400 uppercase block mb-4 tracking-widest">Áudio</label>
                <button id="micToggle" class="w-full bg-indigo-50 dark:bg-[#2a2a2a] text-indigo-700 dark:text-indigo-400 text-sm font-bold py-4 rounded-2xl flex items-center justify-center gap-3 mb-4">
                    🎤 Ativar Microfone
                </button>
                <div class="w-full h-2 bg-slate-100 dark:bg-[#37393b] rounded-full overflow-hidden mb-2">
                    <div id="volMeter" class="h-full bg-emerald-400 dark:bg-emerald-500 w-0 transition-all"></div>
                </div>
                <input type="range" id="thresholdSlider" min="0.001" max="0.1" step="0.001" value="0.01" class="w-full accent-indigo-600">
            </section>

            <section>
                <label class="text-xs font-bold text-slate-400 uppercase block mb-4 tracking-widest">Opções</label>
                <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-[#2a2a2a] rounded-2xl mb-4">
                    <span class="text-sm font-bold">Acidentes (#/b)</span>
                    <input type="checkbox" id="accidentalToggle" class="w-5 h-5 accent-indigo-600">
                </div>
                <select id="namingSelect" class="w-full bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] text-sm font-bold rounded-xl p-3 mb-4">
                    <option value="letters">C, D, E...</option>
                    <option value="solfege" selected>Dó, Ré, Mi...</option>
                </select>
                <select id="modeSelect" class="w-full bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] text-sm font-bold rounded-xl p-3">
                    <option value="practice">Prática Livre</option>
                    <option value="timeAttack">Time Attack (60s)</option>
                    <option value="survival">Survival (3s)</option>
                </select>
            </section>
        </div>
    </aside>

    <script>
        const VF = Vex.Flow;
        const namingMap = { 'C': 'Dó', 'C#': 'Dó#', 'Db': 'Réb', 'D': 'Ré', 'D#': 'Ré#', 'Eb': 'Mib', 'E': 'Mi', 'F': 'Fá', 'F#': 'Fá#', 'Gb': 'Solb', 'G': 'Sol', 'G#': 'Sol#', 'Ab': 'Láb', 'A': 'Lá', 'A#': 'Lá#', 'Bb': 'Sib', 'B': 'Si' };
        
        const notesBase = [
            { key: "c/4", name: "C", acc: null }, { key: "c/4", name: "C#", acc: "#" },
            { key: "d/4", name: "Db", acc: "b" }, { key: "d/4", name: "D", acc: null },
            { key: "d/4", name: "D#", acc: "#" }, { key: "e/4", name: "Eb", acc: "b" },
            { key: "e/4", name: "E", acc: null }, { key: "f/4", name: "F", acc: null },
            { key: "f/4", name: "F#", acc: "#" }, { key: "g/4", name: "Gb", acc: "b" },
            { key: "g/4", name: "G", acc: null }, { key: "g/4", name: "G#", acc: "#" },
            { key: "a/4", name: "Ab", acc: "b" }, { key: "a/4", name: "A", acc: null },
            { key: "a/4", name: "A#", acc: "#" }, { key: "b/4", name: "Bb", acc: "b" },
            { key: "b/4", name: "B", acc: null }
        ];

        let score = 0, namingConvention = "solfege", gameMode = "practice", exerciseType = "phrase";
        let isGameActive = false, isMicEnabled = false, currentThreshold = 0.01, includeAccidentals = false;
        let currentPhrase = [], activeNoteIndex = 0;
        let audioCtx, analyser, dataArray;

        // UI Elements
        const scoreEl = document.getElementById("score"), timerEl = document.getElementById("timerDisplay"), buttonGrid = document.getElementById("buttonGrid");
        const gameContainer = document.getElementById("game-container");

        // --- THEME LOGIC (Deep Dark) ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                themeIcon.innerText = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                themeIcon.innerText = '🌙';
            }
            renderChallenge(); // Redesenha com novas cores
        }

        const savedTheme = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme) applyTheme(savedTheme);
        else if (systemDark) applyTheme('dark');

        themeToggle.onclick = () => {
            const isDark = document.documentElement.classList.contains('dark');
            const newTheme = isDark ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
        };

        function initButtons() {
            buttonGrid.innerHTML = "";
            const list = includeAccidentals ? ['C', 'C#', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'] : ['C', 'D', 'E', 'F', 'G', 'A', 'B'];
            list.forEach(n => {
                const btn = document.createElement("button");
                btn.className = "bg-white dark:bg-[#2a2a2a] border-2 border-slate-100 dark:border-[#37393b] hover:border-indigo-500 hover:text-indigo-600 text-slate-700 dark:text-slate-200 py-4 rounded-2xl text-sm font-bold transition-all active:scale-95 shadow-sm";
                btn.innerText = namingConvention === 'solfege' ? namingMap[n] : n;
                btn.onclick = () => checkAnswer(n);
                buttonGrid.appendChild(btn);
            });
        }

        function generatePhrase() {
            const pool = includeAccidentals ? notesBase : notesBase.filter(n => !n.acc);
            const len = exerciseType === 'single' ? 1 : 4;
            currentPhrase = Array.from({length: len}, () => pool[Math.floor(Math.random() * pool.length)]);
            activeNoteIndex = 0;
        }

        function renderChallenge() {
            const output = document.getElementById("output");
            if (!output) return;
            output.innerHTML = "";
            
            // SEGURANÇA 1: Garante que a frase exista antes de tentar mapear as notas
            if (!currentPhrase || currentPhrase.length === 0) {
                generatePhrase();
            }

            const isDark = document.documentElement.classList.contains('dark');
            const renderer = new VF.Renderer(output, VF.Renderer.Backends.SVG);
            const width = exerciseType === 'phrase' ? 450 : 250;
            renderer.resize(width, 200);
            const context = renderer.getContext();
            
            const staveColor = isDark ? '#64748b' : '#cbd5e1';
            const stave = new VF.Stave(10, 60, width - 20);
            stave.setContext(context);
            stave.getContext().setStrokeStyle(staveColor);
            stave.getContext().setFillStyle(staveColor);
            stave.addClef("treble").draw();
            
            // SEGURANÇA 2: Filtra qualquer possível 'undefined' que tenha entrado no array
            const staveNotes = currentPhrase
                .filter(n => n && n.key) 
                .map((n, i) => {
                    const sn = new VF.StaveNote({ 
                        clef: "treble", 
                        keys: [n.key], 
                        duration: "q", 
                        auto_stem: true 
                    });
                    if (n.acc) sn.addModifier(new VF.Accidental(n.acc), 0);
                    
                    let color;
                    if (i === activeNoteIndex) color = isDark ? '#a5b4fc' : '#4f46e5'; 
                    else if (i < activeNoteIndex) color = isDark ? '#34d399' : '#10b981'; 
                    else color = isDark ? '#475569' : '#e2e8f0'; 
                    
                    sn.setStyle({ fillStyle: color, strokeStyle: color });
                    return sn;
                });

            // SEGURANÇA 3: Só chama o Formatter se houver notas válidas para formatar
            if (staveNotes.length > 0) {
                try {
                    const voice = new VF.Voice({
                        num_beats: staveNotes.length, // Usa o tamanho real do array de notas
                        beat_value: 4
                    }).addTickables(staveNotes);

                    new VF.Formatter().joinVoices([voice]).format([voice], width - 100);
                    voice.draw(context, stave);
                } catch (e) {
                    console.error("Erro na formatação do VexFlow:", e);
                }
            }
        }

        // Função auxiliar para cor padrão das notas no dark/light
        function mainNoteColor(isDark) {
            return isDark ? '#f8fafc' : '#1e293b'; // Branco Gelo / Azul Ardósia Escuro
        }

        function checkAnswer(guess) {
            if (gameMode !== 'practice' && !isGameActive) return;
            const target = currentPhrase[activeNoteIndex].name;
            const enharmonics = { 'C#': ['C#', 'Db'], 'Db': ['C#', 'Db'], 'D#': ['D#', 'Eb'], 'Eb': ['D#', 'Eb'], 'F#': ['F#', 'Gb'], 'Gb': ['F#', 'Gb'], 'G#': ['G#', 'Ab'], 'Ab': ['G#', 'Ab'], 'A#': ['A#', 'Bb'], 'Bb': ['A#', 'Bb'] };
            const isCorrect = (guess === target) || (enharmonics[target] && enharmonics[target].includes(guess));

            if (isCorrect) {
                activeNoteIndex++;
                if (activeNoteIndex >= currentPhrase.length) {
                    score++; scoreEl.innerText = score;
                    gameContainer.classList.add("correct-flash");
                    setTimeout(() => gameContainer.classList.remove("correct-flash"), 200);
                    generatePhrase();
                }
                renderChallenge();
            } else {
                gameContainer.classList.add("wrong-flash");
                setTimeout(() => gameContainer.classList.remove("wrong-flash"), 300);
            }
        }

        // AUDIO & MIC
        async function setupMic() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
                const source = audioCtx.createMediaStreamSource(stream);
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 2048;
                source.connect(analyser);
                dataArray = new Float32Array(analyser.frequencyBinCount);
                isMicEnabled = true;
                document.getElementById("micToggle").innerText = "🎤 Microfone Ativo";
                document.getElementById("detectedNoteContainer").classList.remove("hidden");
                detectPitch();
            } catch (err) { console.error(err); alert("Erro ao acessar microfone."); }
        }

        function detectPitch() {
            if (!isMicEnabled) return;
            analyser.getFloatTimeDomainData(dataArray);
            let rms = 0;
            for (let i=0; i<dataArray.length; i++) rms += dataArray[i]*dataArray[i];
            rms = Math.sqrt(rms/dataArray.length);
            document.getElementById("volMeter").style.width = Math.min(rms * 500, 100) + "%";
            if (rms > currentThreshold) {
                const pitch = autoCorrelate(dataArray, audioCtx.sampleRate);
                if (pitch !== -1) {
                    const noteName = getNoteFromFreq(pitch);
                    if (noteName) {
                        checkAnswer(noteName);
                        document.getElementById("detectedNoteText").innerText = namingConvention === 'solfege' ? namingMap[noteName] : noteName;
                    }
                }
            }
            requestAnimationFrame(detectPitch);
        }

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length, maxval=-1, maxpos=-1, c = new Array(SIZE).fill(0);
            for (let i=0; i<SIZE; i++) for (let j=0; j<SIZE-i; j++) c[i] = c[i] + buf[j]*buf[j+i];
            let d=0; while (c[d]>c[d+1]) d++;
            for (let i=d; i<SIZE; i++) { if (c[i] > maxval) { maxval = c[i]; maxpos = i; } }
            return sampleRate/maxpos;
        }

        function getNoteFromFreq(freq) {
            const notesScale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            const j = Math.round(12 * (Math.log(freq / 440) / Math.log(2))) + 69;
            return notesScale[j % 12];
        }

        // TIMERS & GAME LOGIC
        let timer, timeLeft, survivalTimeout;
        function startTimer(seconds) {
            clearInterval(timer); timeLeft = seconds;
            timer = setInterval(() => { timeLeft--; timerEl.innerText = `${timeLeft}s`; if (timeLeft <= 0) endGame("Fim de Tempo!"); }, 1000);
        }
        function startSurvivalTimer() {
            clearTimeout(survivalTimeout);
            const bar = document.getElementById("survivalBar");
            bar.style.width = "100%"; bar.style.transition = "none"; void bar.offsetWidth;
            bar.style.transition = "width 3s linear"; bar.style.width = "0%";
            survivalTimeout = setTimeout(() => { if(isGameActive) endGame("Lento!"); }, 3000);
        }
        function startGame() {
            score = 0; scoreEl.innerText = "0"; isGameActive = true;
            document.getElementById("startBtn").classList.add("hidden");
            if (gameMode === 'timeAttack') startTimer(60);
            else if (gameMode === 'survival') { timerEl.innerText = "∞"; document.getElementById("survivalBarContainer").classList.remove("hidden"); }
            generatePhrase(); renderChallenge();
        }
        function endGame(msg) {
            isGameActive = false; clearInterval(timer); clearTimeout(survivalTimeout);
            alert(`${msg}\nScore: ${score}`);
            document.getElementById("startBtn").classList.remove("hidden");
            document.getElementById("survivalBarContainer").classList.add("hidden");
        }

        // INIT
        document.getElementById("toggleSettings").onclick = () => document.getElementById("settingsPanel").classList.add("open");
        document.getElementById("closeSettings").onclick = () => document.getElementById("settingsPanel").classList.remove("open");
        document.getElementById("exerciseType").onchange = (e) => { exerciseType = e.target.value; generatePhrase(); renderChallenge(); };
        document.getElementById("accidentalToggle").onchange = (e) => { includeAccidentals = e.target.checked; initButtons(); generatePhrase(); renderChallenge(); };
        document.getElementById("namingSelect").onchange = (e) => { namingConvention = e.target.value; initButtons(); renderChallenge(); };
        document.getElementById("thresholdSlider").oninput = (e) => { currentThreshold = parseFloat(e.target.value); };
        document.getElementById("micToggle").onclick = () => setupMic();
        document.getElementById("modeSelect").onchange = (e) => { gameMode = e.target.value; document.getElementById("startBtn").classList.toggle("hidden", gameMode === 'practice'); };
        document.getElementById("startBtn").onclick = startGame;

        initButtons();
        generatePhrase();
        renderChallenge();
    </script>
</body>
</html>
