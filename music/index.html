            </button>
            <button id="toggleSettings" class="p-2 hover:bg-slate-100 dark:hover:bg-[#2a2a2a] rounded-md transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-600 dark:text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4 md:p-6 gap-4 md:gap-8">
        <div id="game-container" class="bg-white dark:bg-[#2a2a2a] p-4 md:p-10 rounded-xl shadow-2xl dark:shadow-indigo-950/20 border border-slate-100 dark:border-[#37393b] flex flex-col items-center justify-center relative w-full max-w-xl transition-colors overflow-visible">
            <div id="output" class="flex justify-center w-full"></div>
            <div id="detectedNoteContainer" class="absolute top-6 right-8 hidden bg-indigo-50 dark:bg-[#37393b] px-4 py-1.5 rounded-full border border-indigo-100 dark:border-indigo-900 flex items-center shadow-sm">
                <span class="text-[10px] font-bold text-indigo-400 dark:text-indigo-300 uppercase mr-2">Ouvindo:</span>
                <span id="detectedNoteText" class="text-sm font-black text-indigo-600 dark:text-indigo-400 uppercase">--</span>
            </div>
            <div id="survivalBarContainer" class="absolute bottom-0 left-0 w-full h-3 bg-slate-100 dark:bg-[#37393b] hidden rounded-b-xl overflow-hidden">
                <div id="survivalBar" class="h-full bg-orange-500 w-full timer-bar"></div>
            </div>
        </div>

        <button id="startBtn" class="px-16 bg-indigo-600 dark:bg-indigo-500 hover:bg-indigo-700 dark:hover:bg-indigo-600 text-white font-bold py-5 rounded-lg shadow-xl transition-all hidden">
            Começar Treino
        </button>

        <div id="buttonGrid" class="mx-auto"></div>
    </main>

    <aside id="settingsPanel" class="fixed top-0 right-0 h-full w-80 bg-white dark:bg-[#0e0e0f] shadow-2xl z-20 p-8 border-l border-slate-200 dark:border-[#37393b] overflow-y-auto text-slate-700 dark:text-slate-300">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold dark:text-white">Ajustes</h2>
            <button id="closeSettings" class="text-slate-400 hover:text-slate-600 p-2 font-bold">✕</button>
        </div>
        <div class="space-y-8">
            <section>
                <label class="text-xs font-bold text-slate-400 uppercase block mb-4 tracking-widest">Exercício</label>
                <select id="exerciseType" class="w-full bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] text-sm font-bold rounded-md p-3 outline-none">
                    <option value="single">Nota Única</option>
                    <option value="phrase" selected>Frase (4 notas)</option>
                </select>
            </section>
            <section>
                <label class="text-xs font-bold text-slate-400 uppercase block mb-4 tracking-widest">Áudio</label>
                <button id="micToggle" class="w-full bg-indigo-50 dark:bg-[#2a2a2a] text-indigo-700 dark:text-indigo-400 text-sm font-bold py-4 rounded-lg flex items-center justify-center gap-3 mb-4">
                    🎤 Ativar Microfone
                </button>
                <div class="w-full h-2 bg-slate-100 dark:bg-[#37393b] rounded-full overflow-hidden mb-2">
                    <div id="volMeter" class="h-full bg-emerald-400 dark:bg-emerald-500 w-0 transition-all"></div>
                </div>
                <input type="range" id="thresholdSlider" min="0.001" max="0.1" step="0.001" value="0.01" class="w-full accent-indigo-600">
            </section>
            <section>
                <label class="text-xs font-bold text-slate-400 uppercase block mb-4 tracking-widest">Opções</label>
                <select id="buttonLayoutSelect" class="w-full bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] text-sm font-bold rounded-md p-3 mb-4">
                    <option value="circle" selected>Botões em Círculo</option>
                    <option value="grid">Botões em Grade</option>
                </select>
                <select id="staffModeSelect" class="w-full bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] text-sm font-bold rounded-md p-3 mb-4">
                    <option value="both" selected>Clave de Sol + Fá (Ambas)</option>
                    <option value="treble">Clave de Sol (Treble)</option>
                    <option value="bass">Clave de Fá (Bass)</option>
                </select>
                <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-[#2a2a2a] rounded-lg mb-4">
                    <span class="text-sm font-bold">Acidentes (#/b)</span>
                    <input type="checkbox" id="accidentalToggle" class="w-5 h-5 accent-indigo-600">
                </div>
                <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-[#2a2a2a] rounded-lg mb-4">
                    <span class="text-sm font-bold">Extenso (linhas adicionais)</span>
                    <input type="checkbox" id="extendedToggle" class="w-5 h-5 accent-indigo-600">
                </div>
                <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-[#2a2a2a] rounded-lg mb-4">
                    <span class="text-sm font-bold">Vibração (haptic)</span>
                    <input type="checkbox" id="hapticsToggle" class="w-5 h-5 accent-indigo-600">
                </div>
                <select id="namingSelect" class="w-full bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] text-sm font-bold rounded-md p-3 mb-4">
                    <option value="letters">C, D, E...</option>
                    <option value="solfege" selected>Dó, Ré, Mi...</option>
                </select>
                <select id="modeSelect" class="w-full bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] text-sm font-bold rounded-md p-3 mb-3">
                    <option value="practice">Prática Livre</option>
                    <option value="timeAttack">Time Attack</option>
                    <option value="survival">Survival</option>
                </select>
                <div class="flex gap-2">
                    <div class="flex-1 bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] rounded-md p-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Time Attack (s)</label>
                        <input type="number" id="timeAttackDuration" min="10" max="600" step="10" class="w-full bg-transparent text-sm font-bold outline-none">
                    </div>
                    <div class="flex-1 bg-slate-50 dark:bg-[#2a2a2a] border border-slate-200 dark:border-[#37393b] rounded-md p-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Survival (s/nota)</label>
                        <input type="number" id="survivalDuration" min="1" max="30" step="1" class="w-full bg-transparent text-sm font-bold outline-none">
                    </div>
                </div>
            </section>
        </div>
    </aside>

</body>
</html>
